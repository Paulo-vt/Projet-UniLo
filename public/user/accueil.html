<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLo - Accueil</title>
    <link rel="icon" type="image/png" href="../images/logo_unilo.png">
    <script src="../js/auth.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            min-height: 100vh;
            background: #f5f5f5;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #0066cc;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .logo img {
            width: 100px;
            height: auto;
            max-width: 100%;
        }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-menu li {
            margin: 5px 0;
        }

        .nav-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-menu a.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-bottom {
            margin-top: auto;
            padding-top: 20px;
        }

        .nav-bottom a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 600;
        }

        .nav-bottom a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-bottom a.logout {
            text-decoration: underline;
        }

        /* Main Content */
        .main-content {
            margin-left: 220px;
            flex: 1;
            padding: 40px 60px;
        }

        .welcome-title {
            color: #0066cc;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* Emprunts Card */
        .emprunts-card {
            background: #0066cc;
            color: white;
            border-radius: 15px;
            padding: 25px 30px;
            margin-bottom: 40px;
            max-width: 500px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }

        .emprunts-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
        }

        .emprunts-card p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .emprunts-card a {
            color: white;
            font-weight: 600;
            text-decoration: underline;
        }

        .emprunt-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Categories Section */
        .section-title {
            color: #0066cc;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .categories-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
        }

        .category-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: background 0.3s, transform 0.2s;
            text-decoration: none;
            display: block;
        }

        .category-btn:hover {
            background: #0055aa;
            transform: translateX(5px);
        }

        .catalog-link {
            margin-top: 25px;
            text-align: center;
            max-width: 600px;
        }

        .catalog-link a {
            color: #0066cc;
            font-style: italic;
            text-decoration: none;
        }

        .catalog-link a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div x-data="accueilApp()" x-init="init()">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <img src="../images/logo_unilo.png" alt="UniLo Logo">
            </div>

            <ul class="nav-menu">
                <li><a href="accueil.html" class="active">Accueil</a></li>
                <li><a href="catalogue.html">Catalogue</a></li>
            </ul>

            <div class="nav-bottom">
                <a href="profil.html">Profil</a>
                <a href="#" class="logout" @click.prevent="logout()">Déconnexion</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="welcome-title">Bienvenue <span x-text="user ? user.prenom : '...'"></span> !</h1>

            <!-- Emprunts actuels -->
            <a href="profil.html" class="emprunts-card">
                <p>Vous empruntez actuellement...</p>
                <template x-if="loading">
                    <span class="loading">Chargement...</span>
                </template>
                <template x-if="!loading && emprunts.length === 0">
                    <span>Aucun emprunt.</span>
                </template>
                <template x-if="!loading && emprunts.length > 0">
                    <div>
                        <template x-for="emprunt in emprunts" :key="emprunt.id_emprunt">
                            <div class="emprunt-item">
                                <strong x-text="emprunt.produit?.nom || 'Produit'"></strong>
                                <br>
                                <small>Retour : <span x-text="emprunt.date_retour"></span></small>
                            </div>
                        </template>
                    </div>
                </template>
            </a>

            <!-- Catégories -->
            <h2 class="section-title">Catégories</h2>
            <div class="categories-list">
                <template x-if="loadingCategories">
                    <span class="loading">Chargement des catégories...</span>
                </template>
                <template x-for="categorie in categories" :key="categorie.id_categorie">
                    <a :href="'catalogue.html?categorie=' + categorie.id_categorie" class="category-btn" x-text="categorie.nom"></a>
                </template>
            </div>

            <div class="catalog-link">
                <a href="catalogue.html">Consulter tout le catalogue</a>
            </div>
        </main>
    </div>

    <script>
        function accueilApp() {
            return {
                user: null,
                emprunts: [],
                categories: [],
                loading: true,
                loadingCategories: true,
                authChecked: false,

                async init() {
                    // Vérifier l'authentification - rediriger admin vers espace admin
                    const isAllowed = await Auth.requireStudent();
                    if (!isAllowed) return;
                    
                    this.user = Auth.getUser();
                    this.authChecked = true;
                    
                    await Promise.all([
                        this.fetchEmprunts(),
                        this.fetchCategories()
                    ]);
                },

                async fetchEmprunts() {
                    try {
                        if (this.user) {
                            const response = await fetch(`/challg/public/api/users/${this.user.id_user}/emprunts`);
                            if (response.ok) {
                                const allEmprunts = await response.json();
                                // Filtrer pour ne garder que les emprunts non retournés
                                this.emprunts = allEmprunts.filter(e => !e.returned);
                            }
                        }
                    } catch (err) {
                        console.error('Erreur:', err);
                    } finally {
                        this.loading = false;
                    }
                },

                async fetchCategories() {
                    try {
                        const response = await fetch('/challg/public/api/categories');
                        if (response.ok) {
                            this.categories = await response.json();
                        }
                    } catch (err) {
                        console.error('Erreur:', err);
                    } finally {
                        this.loadingCategories = false;
                    }
                },

                async logout() {
                    await Auth.logout();
                }
            }
        }
    </script>
</body>
</html>
