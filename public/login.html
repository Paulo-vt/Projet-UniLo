<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLo - Connexion</title>
    <link rel="icon" type="image/png" href="images/logo_unilo.png">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #0066cc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo img {
            width: 150px;
            height: auto;
        }

        .logo-placeholder {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #0066cc;
            font-weight: bold;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-title {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #0066cc;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #0055aa;
            transform: translateY(-2px);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .message-error {
            background: #f8d7da;
            color: #721c24;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }

        .register-link a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container" x-data="loginApp()">
        <!-- Logo -->
        <div class="logo">
            <img src="images/logo_unilo.png" alt="UniLo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="logo-placeholder" style="display: none;">UL</div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h1 class="login-title">Connexion</h1>

            <!-- Messages -->
            <div class="message message-error" x-show="error" x-text="error"></div>
            <div class="message message-success" x-show="success" x-text="success"></div>

            <!-- Form -->
            <form @submit.prevent="login()">
                <div class="form-group">
                    <label for="mail">Adresse email</label>
                    <input 
                        type="email" 
                        id="mail" 
                        x-model="mail" 
                        placeholder="votre@email.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="mdp">Mot de passe</label>
                    <input 
                        type="password" 
                        id="mdp" 
                        x-model="mdp" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-login" :disabled="loading">
                    <span x-show="loading" class="loading-spinner"></span>
                    <span x-text="loading ? 'Connexion...' : 'Se connecter'"></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function loginApp() {
            return {
                mail: '',
                mdp: '',
                loading: false,
                error: '',
                success: '',

                async login() {
                    this.error = '';
                    this.success = '';
                    this.loading = true;

                    try {
                        const response = await fetch('/challg/public/api/auth/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                mail: this.mail,
                                mdp: this.mdp
                            })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            this.success = 'Connexion réussie ! Redirection...';
                            setTimeout(() => {
                                // Redirection selon le rôle
                                if (data.user && data.user.role === 'admin') {
                                    window.location.href = 'admin/accueil.html';
                                } else {
                                    window.location.href = 'user/accueil.html';
                                }
                            }, 1000);
                        } else {
                            this.error = data.error || 'Identifiants invalides';
                        }
                    } catch (err) {
                        this.error = 'Erreur de connexion au serveur';
                        console.error('Erreur:', err);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
